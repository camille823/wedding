schedule:
  eyebrow: "Our Celebration"
  title: "Wedding Day Schedule"
  description: >
    Follow along to savor every cherished moment with us—from vows to the last sparkling toast.
  events:
    - number: "01"
      label: "Ceremony"
      title: "Ceremony & Vows"
      description: >
        Gather on the chapel lawn for an intimate ceremony beneath the olive trees. Ushers are ready to guide you to your seat.
      details:
        - "Prelude music begins at 3:40 PM"
        - "Rings & vows at golden hour"
        - "Quiet shuttle service begins at 3:15 PM"
    - number: "02"
      label: "Welcome"
      title: "Garden Cocktail Hour"
      description: >
        Sip seasonal cocktails, enjoy live jazz, and mingle beneath the café lights as we transition into the celebration.
      details:
        - "Signature drink: Lavender Paloma"
        - "String trio taking requests"
        - "Canapés served throughout the garden"
    - number: "03"
      label: "Dinner"
      title: "Candlelit Reception"
      description: >
        Savor a farm-to-table feast paired with curated wines while heartfelt toasts and stories fill the room.
      details:
        - "Dinner call at 6:25 PM"
        - "Toasts begin after the second course"
        - "Dessert trio plated at 8:10 PM"
    - number: "04"
      label: "Celebration"
      title: "First Dance & Party"
      description: >
        Kick off the dance floor with our first dance, then stay on your feet for live DJ sets, photo moments, and late-night bites.
      details:
        - "First dance at 8:50 PM"
        - "Dessert lounge opens at 9:30 PM"
        - "Photo booth until 11:30 PM"
    - number: "05"
      label: "Farewell"
      title: "Sparkler Send-Off"
      description: >
        Close the night with a sparkling farewell and a final toast to forever. Shuttles depart every 20 minutes.
      details:
        - "Grab a sparkler by the garden gate"
        - "Final toast at 11:55 PM"
        - "Last shuttle leaves at 12:30 AM"


HoneyFund:
  chapterLabel: "On Gifting"
  heading: "Honey Fund"
  body: |
    We have been blessed to have all of our needs met, so we are not requesting physical gifts at this time. If you would like to give a gift, we have a honeymoon fund. There is no obligation. More than anything, your gift is celebrating this moment with us.

